openair_s4:
  wd: simulations/openair
  run:
    args:
    - run_script.py
    - omnet
    - --override-host-config
    - --omnet-tag
    - 6.3.0
    - --opp.-f
    - omnetpp.ini
    - --opp.-c
    - S4
    - --opp.-r
    - "0"
    - --opp.--sim-time-limit=15s
    - --opp.warmup-period=0s
    - --opp.**.vector-recording=true
    - --opp.outputvectormanager-class=omnetpp::envir::SqliteOutputVectorManager
    - --opp.outputscalarmanager-class=omnetpp::envir::SqliteOutputScalarManager
  extract:
    vectors:
    - id: app_packet_received_bytes
      vector_name: packetReceived:vector(packetBytes)
      module_regex: .*\.app\[\d+\]$
      max_abs_threshold: 23.0
      rmse_threshold: 16.9
    - id: app_end_to_end_delay
      vector_name: endToEndDelay:vector
      module_regex: .*\.app\[\d+\]$
      max_abs_threshold: 1.0
      rmse_threshold: 0.5
    scalars:
    - id: app_packet_sent_bytes_total
      scalar_name: packetSent:sum(packetBytes)
      module_regex: .*\.app\[\d+\]$
      abs_threshold: 1279938.6
    - id: app_packet_received_bytes_total
      scalar_name: packetReceived:sum(packetBytes)
      module_regex: .*\.app\[\d+\]$
      abs_threshold: 624501.8
    - id: mac_received_from_lower_bytes_total
      scalar_name: receivedPacketFromLowerLayer:sum(packetBytes)
      module_regex: .*\.cellularNic\.(?:mac|nrMac)$
      abs_threshold: 661905.4
  baseline: baselines/openair_s4

