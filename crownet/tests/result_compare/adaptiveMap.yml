vadere_corridor_ramp_down:
  wd: simulations/adaptiveMap
  run:
    args:
    - run_script.py
    - vadere-opp
    - --create-vadere-container
    - --override-host-config
    - --opp.-c
    - final_corridor_2x5m_d20_5perSpawn_ramp_down
    - --opp.--sim-time-limit=20s
    - --opp.outputvectormanager-class=omnetpp::envir::SqliteOutputVectorManager
    - --opp.outputscalarmanager-class=omnetpp::envir::SqliteOutputScalarManager
  extract:
    vectors:
    - id: app_packet_sent_bytes
      vector_name: packetSent:vector(packetBytes)
      max_abs_threshold: 1.0
      rmse_threshold: 0.5
    - id: app_packet_received_bytes
      vector_name: packetReceived:vector(packetBytes)
      max_abs_threshold: 2.2
      rmse_threshold: 0.8
    - id: mac_received_from_lower_bytes
      vector_name: receivedPacketFromLowerLayer:vector(packetBytes)
      module_regex: .*\.cellularNic\.(?:mac|nrMac)$
      max_abs_threshold: 1.0
      rmse_threshold: 0.5
    scalars:
    - id: app_packet_sent_count_total
      scalar_name: packetSent:count
      abs_threshold: 2.3
    - id: app_packet_received_count_total
      scalar_name: packetReceived:count
      abs_threshold: 12.5
    - id: mac_received_from_lower_bytes_total
      scalar_name: receivedPacketFromLowerLayer:sum(packetBytes)
      module_regex: .*\.cellularNic\.(?:mac|nrMac)$
      abs_threshold: 2042.9
  baseline: baselines/vadere_corridor_ramp_down

vadere_corridor_5perSpawn:
  wd: simulations/adaptiveMap
  run:
    args:
    - run_script.py
    - vadere-opp
    - --create-vadere-container
    - --override-host-config
    - --opp.-c
    - final_corridor_2x5m_d20_5perSpawn
    - --opp.--sim-time-limit=20s
    - --opp.outputvectormanager-class=omnetpp::envir::SqliteOutputVectorManager
    - --opp.outputscalarmanager-class=omnetpp::envir::SqliteOutputScalarManager
  extract:
    vectors:
    - id: app_packet_sent_bytes
      vector_name: packetSent:vector(packetBytes)
      max_abs_threshold: 1.0
      rmse_threshold: 0.5
    - id: app_packet_received_bytes
      vector_name: packetReceived:vector(packetBytes)
      max_abs_threshold: 2.2
      rmse_threshold: 0.8
    - id: app_received_data_rate
      vector_name: rcvdDataRate:vector
      max_abs_threshold: 236.5
      rmse_threshold: 109.0
    scalars:
    - id: app_packet_sent_bytes_total
      scalar_name: packetSent:sum(packetBytes)
      abs_threshold: 113.9
    - id: app_packet_received_bytes_total
      scalar_name: packetReceived:sum(packetBytes)
      abs_threshold: 622.1
    - id: mac_received_from_lower_bytes_total
      scalar_name: receivedPacketFromLowerLayer:sum(packetBytes)
      module_regex: .*\.cellularNic\.(?:mac|nrMac)$
      abs_threshold: 2038.6
  baseline: baselines/vadere_corridor_5perSpawn
