covicom21_vadere_base_72:
  wd: simulations/coviCom21
  run:
    args:
    - run_script.py
    - vadere-opp
    - --create-vadere-container
    - --override-host-config
    - --opp.-c
    - vadere_base_72
    - --opp.--sim-time-limit=30s
    - --opp.repeat=1
    - --opp.outputvectormanager-class=omnetpp::envir::SqliteOutputVectorManager
    - --opp.outputscalarmanager-class=omnetpp::envir::SqliteOutputScalarManager
  extract:
    vectors:
    - id: app_packet_received_bytes
      vector_name: packetReceived:vector(packetBytes)
      max_abs_threshold: 24.5
      rmse_threshold: 4.7
    - id: app_sent_data_rate
      vector_name: sentDataRate:vector
      max_abs_threshold: 190.1
      rmse_threshold: 190.1
    - id: mac_received_from_lower_bytes
      vector_name: receivedPacketFromLowerLayer:vector(packetBytes)
      module_regex: .*\.cellularNic\.(?:mac|nrMac)$
      max_abs_threshold: 14.2
      rmse_threshold: 3.4
    scalars:
    - id: app_packet_received_count_total
      scalar_name: packetReceived:count
      abs_threshold: 101.8
    - id: app_packet_received_bytes_total
      scalar_name: packetReceived:sum(packetBytes)
      abs_threshold: 21464.6
    - id: mac_received_from_lower_bytes_total
      scalar_name: receivedPacketFromLowerLayer:sum(packetBytes)
      module_regex: .*\.cellularNic\.(?:mac|nrMac)$
      abs_threshold: 48420.7
  baseline: baselines/covicom21_vadere_base_72

