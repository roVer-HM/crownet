cmp_vadere_sumo_sumo_simple_tcp:
  wd: simulations/cmp_vadere_sumo
  run:
    args:
    - run_script.py
    - sumo
    - --create-sumo-container
    - --override-host-config
    - --sumo-tag
    - v1_26_0_hm
    - --omnet-tag
    - 6.3.0
    - --opp.-f
    - omnetpp.ini
    - --opp.-c
    - sumoSimpleTcp
    - --opp.-r
    - "0"
    - --opp.--sim-time-limit=80s
    - --opp.outputvectormanager-class=omnetpp::envir::SqliteOutputVectorManager
    - --opp.outputscalarmanager-class=omnetpp::envir::SqliteOutputScalarManager
  extract:
    vectors:
    - id: app_packet_received_bytes
      vector_name: packetReceived:vector(packetBytes)
      module_regex: World\.pNode\[\d+\]\.app\[0\](?:\.app)?$
      max_abs_threshold: 2.7
      rmse_threshold: 2.3
    - id: app_packet_sent_bytes
      vector_name: packetSent:vector(packetBytes)
      module_regex: World\.pNode\[\d+\]\.app\[0\](?:\.app)?$
      max_abs_threshold: 1.9
      rmse_threshold: 1.4
    - id: app_end_to_end_delay
      vector_name: endToEndDelay:vector
      module_regex: World\.pNode\[\d+\]\.app\[0\](?:\.app)?$
      max_abs_threshold: 1.0
      rmse_threshold: 0.5
    scalars:
    - id: app_packet_received_bytes_total
      scalar_name: packetReceived:sum(packetBytes)
      module_regex: World\.pNode\[\d+\]\.app\[0\](?:\.app)?$
      abs_threshold: 26475.7
    - id: app_packet_sent_bytes_total
      scalar_name: packetSent:sum(packetBytes)
      module_regex: World\.pNode\[\d+\]\.app\[0\](?:\.app)?$
      abs_threshold: 1041.6
    - id: mac_packet_received_from_lower_bytes_total
      scalar_name: receivedPacketFromLowerLayer:sum(packetBytes)
      module_regex: .*\.cellularNic\.(?:mac|nrMac)$
      abs_threshold: 44028.5
  baseline: baselines/cmp_vadere_sumo_sumo_simple_tcp

