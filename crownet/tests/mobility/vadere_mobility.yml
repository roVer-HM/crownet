# Vadere Mobility Trace Fingerprint Tests
# These tests run Vadere standalone (no OMNeT++ coupling) and verify
# that mobility traces remain identical across container upgrades.

corridor_ramp_down:
  wd: simulations/adaptiveMap
  args:
    - ../../tests/mobility/gen_mobility_traces.py
    - --vadere-mobility
    - --scenario
    - corridor_ramp_down
  simtimelimit: 110s
  expectedResult: PASS
  fingerprint: "file:"
  tags:
    exec: python3
    type: shell

