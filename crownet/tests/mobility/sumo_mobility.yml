# SUMO Mobility Trace Fingerprint Tests
# These tests run SUMO standalone (no OMNeT++ coupling) and verify
# that mobility traces remain identical across container upgrades.

bottleneck_sumo:
  wd: simulations/cmp_vadere_sumo
  args:
    - ../../tests/mobility/gen_mobility_traces.py
    - --sumo-mobility
    - --scenario
    - bottleneck_sumo
  simtimelimit: 110s
  expectedResult: PASS
  fingerprint: "file:"
  tags:
    exec: python3
    type: shell

combined:
  wd: simulations/cmp_vadere_sumo
  args:
    - ../../tests/mobility/gen_mobility_traces.py
