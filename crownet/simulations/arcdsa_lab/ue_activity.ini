# ARC-DSA Experimental Validation Scenario - Specification of UE Activity Time Periods
#
# For detailed information on the applied algorithm refer to [1].
# 
# [1] S. Schuhbäck, L. Wischhof, J. Ott (2024): *Adaptive Transmission Rate Control for Decentralized Sensing Applications*, 
#     IEEE Access. [doi: 10.1109/ACCESS.2024.3495504](https://doi.org/10.1109/ACCESS.2024.3495504)

[General]
sim-time-limit=${timeLimit=560.0}s

[Config UEs-Activity-Always]
abstract=true
*.ue[*].app[*].app.startTime = 0s
*.ue[*].app[*].app.stopTime  = ${timeLimit}s


[Config UEs-Activity-Ramp-Up-Down]
abstract=true

# we want 1/4th of the whole time for the ramp-up,
# 1/2th of the whole time for full activity, and
# 1/4th of the whole time for ramp-down

# ramp up:
*.ue[0].app[*].app.startTime  = replaceUnit(((0.0/56.0)*${timeLimit}), "s")
*.ue[1].app[*].app.startTime  = replaceUnit(((1.0/56.0)*${timeLimit}), "s")
*.ue[2].app[*].app.startTime  = replaceUnit(((2.0/56.0)*${timeLimit}), "s")
*.ue[3].app[*].app.startTime  = replaceUnit(((3.0/56.0)*${timeLimit}), "s")
*.ue[4].app[*].app.startTime  = replaceUnit(((4.0/56.0)*${timeLimit}), "s")
*.ue[5].app[*].app.startTime  = replaceUnit(((5.0/56.0)*${timeLimit}), "s")
*.ue[6].app[*].app.startTime  = replaceUnit(((6.0/56.0)*${timeLimit}), "s")
*.ue[7].app[*].app.startTime  = replaceUnit(((7.0/56.0)*${timeLimit}), "s")
*.ue[8].app[*].app.startTime  = replaceUnit(((8.0/56.0)*${timeLimit}), "s")
*.ue[9].app[*].app.startTime  = replaceUnit(((9.0/56.0)*${timeLimit}), "s")
*.ue[10].app[*].app.startTime = replaceUnit(((10.0/56.0)*${timeLimit}), "s")
*.ue[11].app[*].app.startTime = replaceUnit(((11.0/56.0)*${timeLimit}), "s")
*.ue[12].app[*].app.startTime = replaceUnit(((12.0/56.0)*${timeLimit}), "s")
*.ue[13].app[*].app.startTime = replaceUnit(((13.0/56.0)*${timeLimit}), "s")


# ramp-down:
*.ue[0].app[*].app.stopTime   = replaceUnit((((43.0)/56.0)*${timeLimit}), "s")
*.ue[1].app[*].app.stopTime   = replaceUnit((((44.0)/56.0)*${timeLimit}), "s")
*.ue[2].app[*].app.stopTime   = replaceUnit((((45.0)/56.0)*${timeLimit}), "s")
*.ue[3].app[*].app.stopTime   = replaceUnit((((46.0)/56.0)*${timeLimit}), "s")
*.ue[4].app[*].app.stopTime   = replaceUnit((((47.0)/56.0)*${timeLimit}), "s")
*.ue[5].app[*].app.stopTime   = replaceUnit((((48.0)/56.0)*${timeLimit}), "s")
*.ue[6].app[*].app.stopTime   = replaceUnit((((49.0)/56.0)*${timeLimit}), "s")
*.ue[7].app[*].app.stopTime   = replaceUnit((((50.0)/56.0)*${timeLimit}), "s")
*.ue[8].app[*].app.stopTime   = replaceUnit((((51.0)/56.0)*${timeLimit}), "s")
*.ue[9].app[*].app.stopTime   = replaceUnit((((52.0)/56.0)*${timeLimit}), "s")
*.ue[10].app[*].app.stopTime  = replaceUnit((((53.0)/56.0)*${timeLimit}), "s")
*.ue[11].app[*].app.stopTime  = replaceUnit((((54.0)/56.0)*${timeLimit}), "s")
*.ue[12].app[*].app.stopTime  = replaceUnit((((55.0)/56.0)*${timeLimit}), "s")
*.ue[13].app[*].app.stopTime  = replaceUnit((((56.0)/56.0)*${timeLimit}), "s")


[Config UEs-Activity-Bursts]
abstract=true

*.ue[0..1].app[*].app.startTime  = replaceUnit(((0.0/56.0)*${timeLimit}), "s")
*.ue[2..7].app[*].app.startTime  = replaceUnit(((7.0/56.0)*${timeLimit}), "s")
*.ue[8..13].app[*].app.startTime = replaceUnit(((14.0/56.0)*${timeLimit}), "s")

*.ue[0..1].app[*].app.stopTime   = replaceUnit(((56.0/56.0)*${timeLimit}), "s")
*.ue[2..7].app[*].app.stopTime   = replaceUnit(((49.0/56.0)*${timeLimit}), "s")
*.ue[8..13].app[*].app.stopTime  = replaceUnit(((42.0/56.0)*${timeLimit}), "s")